            [array[i], array[j]] = [array[j], array[i]];
        }
        return array;
    }

    function resetProgress() {
        if(confirm("Are you sure you want to delete all passed scores and restart from Module 1?")) {
            localStorage.removeItem('easterProg');
            unlockedLevel = 0;
            showMenu();
        }
    }

    function showMenu() {
        document.getElementById('menu').style.display = 'block';
        document.getElementById('quiz-area').style.display = 'none';
        document.getElementById('result-area').style.display = 'none';
        const list = document.getElementById('module-list');
        list.innerHTML = '';
        allModules.forEach((mod, idx) => {
            const btn = document.createElement('button');
            btn.className = `module-btn ${idx < unlockedLevel ? 'passed' : ''}`;
            btn.disabled = idx > unlockedLevel;
            const badge = idx < unlockedLevel ? '<span class="badge-passed">PASSED ✓</span>' : 
                         (idx === unlockedLevel ? '<span style="color:#1e3a8a">▶ START</span>' : '<span style="color:#94a3b8">LOCKED 🔒</span>');
            btn.innerHTML = `<span><strong>${idx + 1}.</strong> ${mod.title}</span> ${badge}`;
            btn.onclick = () => startQuiz(idx);
            list.appendChild(btn);
        });
    }

    function startQuiz(idx) {
        currentModuleIdx = idx;
        const mod = allModules[idx];
        currentQ = 0;
        score = 0;
        failedQuestions = [];
        
        // Shuffle options for each question to ensure randomization
        currentShuffledQuestions = mod.questions.map(q => {
            let newQ = {...q};
            newQ.options = shuffleArray([...q.options]);
            return newQ;
        });

        document.getElementById('menu').style.display = 'none';
        document.getElementById('quiz-area').style.display = 'block';
        document.getElementById('module-title').innerText = mod.title;
        
        if (mod.passage) {
            document.getElementById('passage-container').style.display = 'block';
            document.getElementById('passage-text').innerText = mod.passage;
        } else {
            document.getElementById('passage-container').style.display = 'none';
        }
        loadQuestion();
    }

    function loadQuestion() {
        const qData = currentShuffledQuestions[currentQ];
        const container = document.getElementById('question-container');
        document.getElementById('hint-display').innerText = qData.hint;
        document.getElementById('hint-display').style.display = 'none';
        
        container.innerHTML = `
            <p style="color:#64748b; font-weight:600;">Question ${currentQ + 1} of 20</p>
            <p style="font-size: 19px; margin: 15px 0;"><strong>${qData.q}</strong></p>
            <div class="options">
                ${qData.options.map(opt => `<button onclick="checkAnswer('${opt.replace(/'/g, "\\'")}')">${opt}</button>`).join('')}
            </div>
        `;
    }

    function toggleHintDisplay() {
        const h = document.getElementById('hint-display');
        h.style.display = h.style.display === 'block' ? 'none' : 'block';
    }

    function checkAnswer(userChoice) {
        const qData = currentShuffledQuestions[currentQ];
        if(userChoice === qData.answer) {
            score++;
        } else {
            failedQuestions.push(qData);
        }
        currentQ++;
        if(currentQ < 20) loadQuestion();
        else showResults();
    }

    function showResults() {
        document.getElementById('quiz-area').style.display = 'none';
        document.getElementById('result-area').style.display = 'block';
        const marks = score; 
        const passed = score === 20; // Perfect score required for mastery
        
        document.getElementById('result-status').innerText = passed ? "Success! 🎉" : "Mastery Not Reached";
        document.getElementById('grade-container').innerText = marks >= 18 ? "A+" : (marks >= 14 ? "A" : (marks >= 10 ? "C" : "E"));
        document.getElementById('grade-container').style.color = passed ? "#10b981" : "#ef4444";
        document.getElementById('score-text').innerHTML = `Marks: <strong>${marks}/20</strong><br><small>${passed ? 'Module Complete!' : 'You must get 20/20 to unlock the next level.'}</small>`;
        
        const reviewArea = document.getElementById('review-area');
        const nextBtn = document.getElementById('next-action-btn');
        
        if(passed) {
            reviewArea.style.display = 'none';
            nextBtn.innerText = "NEXT MODULE";
            nextBtn.style.background = "#10b981";
            nextBtn.onclick = () => {
                if(currentModuleIdx === unlockedLevel) {
                    unlockedLevel++;
                    localStorage.setItem('easterProg', unlockedLevel);
                }
                showMenu();
            };
        } else {
            reviewArea.style.display = 'block';
            const fList = document.getElementById('failed-questions');
            fList.innerHTML = '';
            failedQuestions.slice(0, 5).forEach(item => { 
                fList.innerHTML += `<div class="review-item"><strong>Hint:</strong> ${item.hint}</div>`; 
            });
            if(failedQuestions.length > 5) fList.innerHTML += `<div class="review-item"><em>...and ${failedQuestions.length - 5} more. Review your notes carefully!</em></div>`;
            
            nextBtn.innerText = "RETAKE MODULE";
            nextBtn.style.background = "#ef4444";
            nextBtn.onclick = () => startQuiz(currentModuleIdx);
        }
    }
    showMenu();
</script>
</body>
</html>
